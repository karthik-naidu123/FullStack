<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Retrieval & Sorting Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        select, button { margin: 5px; padding: 5px; }
        .counts { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Student Records Dashboard</h1>
    
    <div>
        <label>Sort by:</label>
        <select id="sortBy">
            <option value="name">Name</option>
            <option value="date">Date</option>
        </select>
        <button onclick="sortData()">Sort</button>
        
        <label>Filter by Department:</label>
        <select id="filterDept">
            <option value="">All</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Physics">Physics</option>
        </select>
        <button onclick="filterData()">Filter</button>
    </div>
    
    <div class="counts">
        <h2>Students per Department</h2>
        <div id="departmentCounts"></div>
    </div>
    
    <table id="recordsTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Enrollment Date</th>
                <th>Department</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <script>
        // Sample data
        let students = [
            { name: "Alice Johnson", date: "2023-09-01", department: "Computer Science" },
            { name: "Bob Smith", date: "2023-08-15", department: "Mathematics" },
            { name: "Charlie Brown", date: "2023-07-20", department: "Physics" },
            { name: "Diana Prince", date: "2023-09-10", department: "Computer Science" },
            { name: "Eve Adams", date: "2023-06-05", department: "Mathematics" },
            { name: "Frank Miller", date: "2023-10-01", department: "Physics" },
            { name: "Grace Lee", date: "2023-11-15", department: "Computer Science" }
        ];

        let currentData = [...students];

        function displayData(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            data.forEach(student => {
                const row = `<tr>
                    <td>${student.name}</td>
                    <td>${student.date}</td>
                    <td>${student.department}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        function updateCounts(data) {
            const counts = {};
            data.forEach(student => {
                counts[student.department] = (counts[student.department] || 0) + 1;
            });
            const countsDiv = document.getElementById('departmentCounts');
            countsDiv.innerHTML = '';
            for (const dept in counts) {
                countsDiv.innerHTML += `<p>${dept}: ${counts[dept]} students</p>`;
            }
        }

        function sortData() {
            const sortBy = document.getElementById('sortBy').value;
            currentData.sort((a, b) => {
                if (sortBy === 'name') {
                    return a.name.localeCompare(b.name);
                } else if (sortBy === 'date') {
                    return new Date(a.date) - new Date(b.date);
                }
            });
            displayData(currentData);
            updateCounts(currentData);
        }

        function filterData() {
            const filterDept = document.getElementById('filterDept').value;
            let filtered = students;
            if (filterDept) {
                filtered = students.filter(student => student.department === filterDept);
            }
            currentData = filtered;
            displayData(currentData);
            updateCounts(currentData);
        }

        // Initial display
        displayData(students);
        updateCounts(students);
    </script>
</body>
</html>
