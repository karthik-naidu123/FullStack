<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Login System</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f0f0; }
        .login-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; }
        form { display: flex; flex-direction: column; }
        input { margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; }
        .success { color: green; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Client-side validation
        function validateInputs() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            if (usernameInput.value.trim() === '') {
                showError('Username is required.');
                return false;
            }
            if (passwordInput.value.trim() === '') {
                showError('Password is required.');
                return false;
            }
            if (passwordInput.value.length < 6) {
                showError('Password must be at least 6 characters.');
                return false;
            }
            return true;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
        }

        // Load users from JSON (acting as database)
        async function loadUsers() {
            try {
                const response = await fetch('users.json');
                return await response.json();
            } catch (error) {
                console.error('Error loading users:', error);
                return [];
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateInputs()) return;

            const username = usernameInput.value;
            const password = passwordInput.value;

            const users = await loadUsers();
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                showSuccess('Login successful!');
                // In a real app, redirect or do something
            } else {
                showError('Invalid username or password.');
            }
        });
    </script>
</body>
</html>
